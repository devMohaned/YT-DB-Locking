services:
  postgres:
    build: .
    container_name: clpostgres
    environment:
      POSTGRES_DB: booking_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking_demo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: