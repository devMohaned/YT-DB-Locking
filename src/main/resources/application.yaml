spring:
  application:
    name: lock

  datasource:
    url: jdbc:postgresql://localhost:5432/booking_demo
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level - %msg%n"

server:
  port: 8080